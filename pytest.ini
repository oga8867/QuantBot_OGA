[pytest]
# ── pytest 설정 ──
# 테스트 파일 위치: tests/ 폴더
# 실행: pytest (프로젝트 루트에서)
# 상세 출력: pytest -v
# 커버리지: pytest --cov=. --cov-report=term-missing

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 경고 필터 (불필요한 경고 숨김)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 마커 정의
markers =
    slow: 느린 테스트 (외부 API 호출 등)
    integration: 통합 테스트 (DB 등 외부 리소스 필요)
